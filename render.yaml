# Render.com deployment configuration
databases:
  - name: botbid-db
    plan: free
    databaseName: botbid
    user: botbid

services:
  - type: web
    name: botbid
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /marketplace/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: botbid-db
          property: connectionString
    autoDeploy: true
